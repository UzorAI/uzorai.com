# UzorAI Worker — REFACTOR #15.
# Production cutover complete (2026-06-13): the Worker is deployed and all four
# custom domains (uzorai.com, uzor.ai, www.uzorai.com, www.uzor.ai) are bound to
# it Cloudflare-side. CI deploys via .github/workflows/deploy.yml
# (npm run deploy -> wrangler deploy).
name = "uzorai"
main = "src/server/index.ts"
compatibility_date = "2025-01-01"

# Custom-domain routes — all bound to the Worker (control-plane) as of cutover.
routes = [
  { pattern = "uzorai.com", custom_domain = true },
  { pattern = "uzor.ai", custom_domain = true },
  { pattern = "www.uzorai.com", custom_domain = true },
  { pattern = "www.uzor.ai", custom_domain = true },
]

# Hono serves the built client; SPA fallback is handled by the assets binding.
[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
